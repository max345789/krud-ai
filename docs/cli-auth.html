<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krud AI — Connect Terminal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid #1e1e1e;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: #e6edf3;
    font-weight: 600;
    font-size: 1rem;
  }
  .nav-logo {
    width: 32px; height: 32px;
    border-radius: 50%;
  }

  .card {
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    margin: 5rem 1rem 1rem;
  }

  .card-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    margin-bottom: 1.25rem;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
    color: #fff;
  }
  .subtitle {
    font-size: 0.875rem;
    color: #888;
    margin-bottom: 1.75rem;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 1rem;
  }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: #aaa;
    margin-bottom: 0.35rem;
    letter-spacing: 0.02em;
  }
  input {
    width: 100%;
    padding: 0.7rem 0.9rem;
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #e6edf3;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input:focus { border-color: #555; }
  input[name="user_code"] {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 1rem;
    letter-spacing: 0.08em;
    color: #fff;
  }

  .btn {
    width: 100%;
    padding: 0.75rem;
    margin-top: 0.5rem;
    background: #fff;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .btn:hover { background: #e6edf3; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .trial-note {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: #555;
    margin-top: 1rem;
    justify-content: center;
  }
  .trial-note::before { content: "⚡"; }

  /* success state */
  .success-box {
    display: none;
    text-align: center;
    padding: 1rem 0;
  }
  .success-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
  }
  .success-box h2 {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
    color: #4ade80;
  }
  .success-box p {
    font-size: 0.875rem;
    color: #888;
    line-height: 1.5;
  }

  /* error */
  .error-msg {
    display: none;
    background: #1a0a0a;
    border: 1px solid #5a1a1a;
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    font-size: 0.82rem;
    color: #f87171;
    margin-bottom: 1rem;
  }

  @media (prefers-color-scheme: light) {
    body { background: #f5f5f5; color: #111; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">
    <img src="/logo.png" alt="Krud AI" class="nav-logo">
    Krud AI
  </a>
</nav>

<div class="card">
  <img src="/logo.png" alt="Krud AI" class="card-icon">
  <h1>Connect your terminal</h1>
  <p class="subtitle">Approve this session and start your 14-day free trial. No credit card required.</p>

  <div class="error-msg" id="err"></div>

  <form id="authForm">
    <div class="field">
      <label>User code</label>
      <input type="text" name="user_code" id="user_code"
             placeholder="XXXX-XXXX" maxlength="9" autocomplete="off" required>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" id="email"
             placeholder="you@company.com" required>
    </div>
    <div class="field">
      <label>Name <span style="color:#555">(optional)</span></label>
      <input type="text" name="name" id="name" placeholder="Your name">
    </div>
    <button type="submit" class="btn" id="submitBtn">Approve device →</button>
    <p class="trial-note">14-day free trial · No credit card needed</p>
  </form>

  <div class="success-box" id="successBox">
    <div class="success-icon">✅</div>
    <h2>Terminal connected!</h2>
    <p>You're all set. Switch back to your terminal — Krud AI is ready to use.</p>
  </div>
</div>

<script>
  // Pre-fill user_code from URL param
  const params = new URLSearchParams(location.search);
  const code = params.get('user_code');
  if (code) document.getElementById('user_code').value = code;

  const API = 'https://api.dabcloud.in';

  document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('err');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Approving…';

    const body = new FormData();
    body.append('user_code', document.getElementById('user_code').value.trim());
    body.append('email',     document.getElementById('email').value.trim());
    body.append('name',      document.getElementById('name').value.trim());

    try {
      const res = await fetch(`${API}/cli-auth`, { method: 'POST', body });
      if (res.ok) {
        document.getElementById('authForm').style.display = 'none';
        document.getElementById('successBox').style.display = 'block';
      } else {
        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.detail || 'Invalid or expired device code. Please run `krud login` again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Approve device →';
      }
    } catch {
      errEl.textContent = 'Network error — check your connection and try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Approve device →';
    }
  });
</script>
</body>
</html>
