    <style>
      body {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      input, textarea {
        -webkit-user-select: text;
        -moz-user-select: text;

        user-select: text;

    <script>
      // Disable right click / context menu
      document.addEventListener('contextmenu', event => event.preventDefault());

      // Disable developer tools keybindings
      document.onkeydown = function (e) {
        if (e.keyCode === 123) return false; // F12
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) return false; // Ctrl+Shift+I/J/C
        if (e.ctrlKey && e.keyCode === 85) return false; // Ctrl+U
        if (e.metaKey && e.altKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) return false; // Cmd+Option+I/J/C
        if (e.metaKey && e.keyCode === 85) return false; // Cmd+U
      };

      // Disable copying and cutting
      document.addEventListener('copy', event => {
        // Allow copy if inside an input or textarea
        if (event.target.tagName !== 'INPUT' && event.target.tagName !== 'TEXTAREA') {
          event.preventDefault();
        }
      });
      document.addEventListener('cut', event => {
        if (event.target.tagName !== 'INPUT' && event.target.tagName !== 'TEXTAREA') {
          event.preventDefault();
        }
      });
    </script>
