services:
  - type: web
    name: krud-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: KRUD_PUBLIC_BASE_URL
        value: https://krud-api.onrender.com
      - key: KRUD_DOWNLOAD_BASE_URL
        value: https://downloads.krud.ai
      - key: KRUD_RELEASE_VERSION
        value: "0.1.0"
      - key: KRUD_BILLING_MODE
        value: mock
      - key: KRUD_STRIPE_PRICE_ID
        value: price_krud_monthly
      - key: KRUD_TRIAL_DAYS
        value: "14"
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TIMEOUT_SECONDS
        value: "45"
      - key: KRUD_BILLING_SUCCESS_URL
        value: https://krud-api.onrender.com/billing/success
      - key: KRUD_BILLING_CANCEL_URL
        value: https://krud-api.onrender.com/billing/cancel
      - key: KRUD_BILLING_PORTAL_RETURN_URL
        value: https://krud-api.onrender.com/billing
      - key: OPENAI_API_KEY
        sync: false
