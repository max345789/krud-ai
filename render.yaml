services:
  - type: web
    name: krud-web
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /install.sh
        destination: /install.sh
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: krud-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"

      # ── database (Supabase PostgreSQL) ───────────────────────────────────────
      # Set this in the Render dashboard → Environment → Secret Files / Env Vars.
      # Format: postgresql://postgres:[password]@db.[ref].supabase.co:5432/postgres
      - key: DATABASE_URL
        sync: false

      # ── server ──────────────────────────────────────────────────────────────
      - key: KRUD_PUBLIC_BASE_URL
        value: https://api.dabcloud.in
      - key: KRUD_FRONTEND_URL
        value: https://dabcloud.in
      - key: KRUD_ALLOWED_ORIGINS
        value: https://api.dabcloud.in,https://dabcloud.in,https://www.dabcloud.in
      - key: KRUD_DOWNLOAD_BASE_URL
        value: https://github.com/max345789/krud-ai/releases/download
      - key: KRUD_RELEASE_VERSION
        value: "0.2.0"

      # ── billing (Razorpay) ──────────────────────────────────────────────────
      # Set KRUD_BILLING_MODE=razorpay once your Razorpay keys are configured.
      # Leave as "mock" during initial setup to avoid accidental charges.
      - key: KRUD_BILLING_MODE
        value: mock

      # RAZORPAY_KEY_ID      — from Razorpay dashboard: Settings → API Keys
      # RAZORPAY_KEY_SECRET  — keep as a secret, never commit
      # RAZORPAY_WEBHOOK_SECRET — from Razorpay dashboard: Settings → Webhooks
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      # Subscription Plan ID from Razorpay dashboard: Products → Plans → copy ID
      - key: RAZORPAY_PLAN_ID
        value: plan_placeholder

      - key: KRUD_TRIAL_DAYS
        value: "14"
      - key: KRUD_BILLING_SUCCESS_URL
        value: https://dabcloud.in/payment-success
      - key: KRUD_BILLING_CANCEL_URL
        value: https://dabcloud.in/billing
      - key: KRUD_BILLING_PORTAL_RETURN_URL
        value: https://dabcloud.in/billing

      # ── LLM ────────────────────────────────────────────────────────────────
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: codex-mini-latest
      - key: OPENAI_TIMEOUT_SECONDS
        value: "45"
      - key: OPENAI_API_KEY
        sync: false
